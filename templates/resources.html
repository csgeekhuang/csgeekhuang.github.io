{% extends "base.html" %}

{% block content %}

<b style="color:#a9a9a9">Open Source</b>
<hr class="section" />
GitHub repositories I've contributed to.
<ul>
{% for repo in repos %}
<li>
  <a href="http://github.com/{{ repo.name }}">
    <img alt="GitHub Repo stars" src="https://img.shields.io/github/stars/{{ repo.name }}?label={{repo.name}}" style="vertical-align: middle;margin-bottom:0.25em" />
  </a>
</li>
{% endfor %}
</ul>

{% endblock content %}
